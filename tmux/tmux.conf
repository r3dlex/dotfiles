# Modern Tmux Configuration
# Requires tmux >= 3.0

# ── General ──────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -g mouse on

# Prefix: Ctrl+A (more ergonomic than Ctrl+B)
set -g prefix C-a
unbind C-b
bind C-a send-prefix
bind C-a last-window

# Faster key repetition
set -sg escape-time 0
set -g repeat-time 600
set -g focus-events on

# ── Display ──────────────────────────────────────────────
set -g status-interval 5
set -g status-justify left
set -g status-position bottom

# Catppuccin-inspired colors
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 40
set -g status-right-length 80
set -g status-left "#[fg=#1e1e2e,bg=#89b4fa,bold] #S #[fg=#89b4fa,bg=#1e1e2e] "
set -g status-right "#[fg=#6c7086] %Y-%m-%d #[fg=#cdd6f4]%H:%M #[fg=#1e1e2e,bg=#a6e3a1,bold] #H "

# Window status
setw -g window-status-format "#[fg=#6c7086] #I:#W "
setw -g window-status-current-format "#[fg=#1e1e2e,bg=#cba6f7,bold] #I:#W "
setw -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# Message style
set -g message-style "fg=#cdd6f4,bg=#313244"

# ── Key Bindings ─────────────────────────────────────────
# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# Split panes (use current path)
bind v split-window -h -c "#{pane_current_path}"
bind b split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Vi-mode
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Pane navigation (vim-like)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation
bind -r n next-window
bind -r p previous-window

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity off

# Automatic window rename
setw -g automatic-rename on
